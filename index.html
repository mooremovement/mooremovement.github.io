<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #444;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #00c3ff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px;
      background: white;
    }

    .hero {
      text-align: center;
      padding: 40px 0;
    }

    .hero h1 {
      font-size: 40px;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #0077ff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 15px;
    }

    .button:hover {
      background: #005fd1;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 40px;
    }

  </style>
</head>

<body>

<header>
  <h1>My Website</h1>
  <p>Welcome to my personal site</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="hero">
    <h1>Hello 👋</h1>
    <p>This is my website hosted for free using GitHub Pages.</p>
    <a class="button" href="#">Learn More</a>
  </div>

  <h2>About This Site</h2>
  <p>
  I built this website to learn web development and share my projects.
  </p>

  <h2>Projects</h2>
  <p>
  More projects coming soon.
  </p>

</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

</body>
</html>
